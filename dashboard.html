<html lang="en">

<title>Chill Medicated · Sales Intelligence</title>

<style>

    --accent:#e8d838; --accent-dim:#b0a528; --accent-deep:#8a7d18;
    --warm:#f0a868; --cool:#8fb8d4; --rose:#e07594;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  body{background-image:radial-gradient(ellipse 1200px 600px at 80% -10%,rgba(232,216,56,0.05),transparent 60%),radial-gradient(ellipse 800px 400px at 0% 100%,rgba(124,133,18,0.05),transparent 60%)}
  .font-display{font-family:'Fraunces',serif;font-variation-settings:"opsz" 144;letter-spacing:-0.02em}
  .font-mono{font-family:'JetBrains Mono',monospace}
  .tabular{font-variant-numeric:tabular-nums}
  .app{max-width:1600px;margin:0 auto;padding:32px 40px 80px}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:28px;border-bottom:1px solid var(--border);margin-bottom:36px}
  .brand-name{font-family:'Fraunces',serif;font-weight:500;font-size:28px;letter-spacing:-0.02em;color:var(--text)}
  .brand-tag{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-faint)}
  .topbar-meta{display:flex;gap:24px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)}
  .topbar-meta strong{color:var(--text);font-weight:500}
  .pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .filters{display:flex;gap:16px;flex-wrap:wrap;padding:16px 20px;background:var(--bg-elev);border:1px solid var(--border);border-radius:4px;margin-bottom:32px}

  .kpi-accent .kpi-value{color:var(--accent)}

  .section-title{font-family:'Fraunces',serif;font-weight:500;font-size:20px;letter-spacing:-0.01em}
  .section-title em{color:var(--text-dim);font-style:italic;font-weight:400}
  .section-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.12em}
  .card{background:var(--bg-elev);border:1px solid var(--border);border-radius:4px;padding:24px}

  .rank-bar{position:absolute;bottom:0;left:38px;right:0;height:1px;background:var(--accent-dim);opacity:.4}
  .data-table{width:100%;border-collapse:collapse;font-size:12px}

  .data-table .num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;text-align:right}
  .data-table .dim{color:var(--text-dim)}
  .empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
  .empty h2{font-family:'Fraunces',serif;font-weight:400;font-style:italic;font-size:28px;margin-bottom:12px;color:var(--text)}

  @media (max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-half{grid-template-columns:1fr}}
</style>
